<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exon SMP | Premium Minecraft Deneyimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;900&display=swap');
        body { 
            font-family: 'Outfit', sans-serif; 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://wallpaperaccess.com/full/2212456.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .glow { filter: drop-shadow(0 0 25px rgba(249, 115, 22, 0.7)); }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center p-5">

    <!-- Logo ve Başlık -->
    <header class="flex flex-col items-center text-center mb-16">
        <img src="https://cdn.discordapp.com/attachments/1460981030663098523/1462777449162211434/1X1.png" class="w-64 glow animate-pulse mb-8" alt="Exon SMP">
        <h1 class="text-7xl font-black uppercase tracking-tighter">EXON <span class="text-orange-500">SMP</span></h1>
        <p class="text-gray-400 mt-2 text-lg">2025'ten bu yana premium survival deneyimi.</p>
    </header>

    <!-- IP Kopyalama -->
    <button onclick="copyIP()" class="bg-gradient-to-r from-orange-600 to-red-600 px-10 py-5 rounded-2xl font-black text-2xl tracking-widest shadow-[0_0_50px_rgba(234,88,12,0.4)] hover:scale-105 transition-all">
        play.exonnetwork.com.tr
    </button>
    <p id="copyText" class="text-orange-500 mt-4 opacity-0 transition-opacity font-bold">IP PANODAYIM!</p>

    <!-- Aksiyon Butonları -->
    <section class="mt-16 flex flex-wrap justify-center gap-6">
        <a href="https://www.shopier.com/WienCraft" target="_blank" class="flex items-center gap-3 bg-white text-black px-8 py-4 rounded-xl font-bold hover:bg-orange-500 hover:text-white transition-all">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/Shopier_Logo.png" class="w-6"> MAĞAZA
        </a>
        <a href="https://discord.gg/wRr95fuwmf" target="_blank" class="flex items-center gap-3 bg-indigo-600 text-white px-8 py-4 rounded-xl font-bold hover:bg-indigo-500 transition-all">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" class="w-6 invert"> DISCORD
        </a>
        <a href="https://wa.me/639552110999" target="_blank" class="flex items-center gap-3 bg-green-600 text-white px-8 py-4 rounded-xl font-bold hover:bg-green-500 transition-all">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="w-6 invert"> WHATSAPP
        </a>
    </section>

    <!-- Footer -->
    <footer class="mt-24 text-gray-500 text-sm">
        <p>© 2026 Exon SMP - Tüm Hakları Saklıdır.</p>
    </footer>

    <script>
        function copyIP() {
            navigator.clipboard.writeText("play.exonnetwork.com.tr");
            const text = document.getElementById("copyText");
            text.style.opacity = "1";
            setTimeout(() => { text.style.opacity = "0"; }, 2000);
        }
    </script>
</body>
</html>
