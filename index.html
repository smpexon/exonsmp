<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exon SMP | Premium</title>
    <!-- Sekme logosu 'logo.png' olarak güncellendi -->
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        /* Tüm sayfa full koyu gri */
        body { 
            margin: 0; 
            background: #1a1a1a; 
            color: #f0f0f0; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 60px;
        }
        
        /* En üstteki büyük banner */
        .banner-top { 
            width: 100%; 
            height: 350px; 
            background: url('banner.png') center/cover; 
            border-bottom: 4px solid #ea580c; 
        }
        
        .content { 
            max-width: 800px; 
            width: 90%; 
            padding: 40px 0; 
        }
        
        /* Tıklanabilir IP Kutusu */
        .ip-card { 
            background: #262626; 
            padding: 30px; 
            border-radius: 20px; 
            border: 2px dashed #ea580c; 
            text-align: center; 
            margin-bottom: 40px; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .ip-card:hover { 
            background: #333333; 
        }
        .ip-text { 
            font-family: monospace; 
            font-size: 1.8rem; 
            color: #ea580c; 
            font-weight: bold; 
        }
        
        /* 3'lü Kart Düzeni */
        .grid-top { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 20px; 
        }
        .grid-bottom { 
            display: flex; 
            justify-content: center; 
        }
        
        /* Kart Tasarımları */
        .card { 
            padding: 20px; 
            border: 1px solid #444; 
            border-radius: 20px; 
            text-align: center; 
            background: #262626; 
            flex: 1; 
            max-width: 400px; 
        }
        .card img { 
            width: 100%; 
            height: 140px; 
            object-fit: cover; 
            border-radius: 12px; 
            margin-bottom: 10px; 
        }
        
        /* Butonlar */
        .btn { 
            display: block; 
            background: #ea580c; 
            color: white; 
            padding: 12px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            margin-top: 10px; 
            transition: 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn-dc { background: #5865F2; }
        .btn-wp { background: #25D366; }
    </style>
</head>
<body>

    <div class="banner-top"></div>

    <div class="content">
        <!-- IP Kopyalama Alanı -->
        <div class="ip-card" onclick="copyIP()">
            <h3 style="color: #ccc; margin: 0 0 10px 0;">SUNUCU IP (Tıkla ve Kopyala)</h3>
            <div class="ip-text">play.exonnetwork.com.tr</div>
            <p id="msg" style="font-size: 0.8rem; opacity: 0.6; margin: 10px 0 0 0;">Kopyalamak için üzerine tıkla</p>
        </div>

        <!-- Üstteki Yan Yana 2 Kart -->
        <div class="grid-top">
            <div class="card">
                <img src="logo2.png" alt="Mağaza">
                <a href="https://www.shopier.com/WienCraft" class="btn">MAĞAZA PANELİ</a>
            </div>
            <div class="card">
                <img src="logo3.png" alt="WhatsApp">
                <a href="https://wa.me/639552110999" class="btn btn-wp">WHATSAPP İLETİŞİM</a>
            </div>
        </div>

        <!-- Alttaki Ortalanmış Tek Kart -->
        <div class="grid-bottom">
            <div class="card">
                <img src="discordresmi.png" alt="Discord">
                <a href="https://discord.gg/wRr95fuwmf" class="btn btn-dc">DISCORD TOPLULUĞU</a>
            </div>
        </div>
    </div>

    <script>
        function copyIP() {
            navigator.clipboard.writeText("play.exonnetwork.com.tr");
            const msg = document.getElementById("msg");
            msg.innerText = "IP BAŞARIYLA KOPYALANDI!";
            msg.style.color = "#ea580c";
            setTimeout(() => { 
                msg.innerText = "Kopyalamak için üzerine tıkla"; 
                msg.style.color = "#ccc"; 
            }, 2000);
        }
    </script>
</body>
</html>
