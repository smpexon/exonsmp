<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exon SMP | Premium</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        /* Animasyon: Sayfa açılış efekti */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body { 
            margin: 0; 
            background: #121212; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px 20px;
            animation: fadeIn 1s ease-out;
        }
        
        .container { 
            display: grid; 
            grid-template-columns: repeat(3, 300px); 
            gap: 20px; 
            max-width: 960px; 
            width: 100%;
        }
        
        /* Kart Tasarımları */
        .card { 
            background: #1e1e1e; 
            padding: 15px; 
            border-radius: 15px; 
            text-align: center; 
            border: 1px solid #333; 
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: #555; }
        .card img { width: 100%; height: 160px; object-fit: cover; border-radius: 10px; }
        
        /* IP Kutusu (2 sütun kaplar) */
        .ip-box { 
            grid-column: span 2; 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            text-align: center; 
            cursor: pointer;
        }
        .ip-text { font-family: monospace; font-size: 1.8rem; color: #ea580c; margin-top: 10px; font-weight: bold; }
        
        /* Butonlar */
        .btn { display: block; background: #ea580c; color: white; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 15px; }
        .btn-dc { background: #5865F2; }
        .btn-wp { background: #25D366; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card"><img src="logo.png"></div>
        
        <div class="ip-box" onclick="copyIP()" id="ipBox">
            <h3>SUNUCU ADRESİ</h3>
            <div class="ip-text" id="ipText">play.exonnetwork.com.tr</div>
            <p id="msg" style="font-size: 0.8rem; opacity: 0.6; margin-top: 5px;">Kopyalamak için tıkla</p>
        </div>

        <div class="card">
            <img src="logo2.png">
            <a href="https://www.shopier.com/WienCraft" class="btn">MAĞAZA PANELİ</a>
        </div>
        <div class="card">
            <img src="logo3.png">
            <a href="https://wa.me/639552110999" class="btn btn-wp">WHATSAPP İLETİŞİM</a>
        </div>
        <div class="card">
            <img src="discordresmi.png">
            <a href="https://discord.gg/wRr95fuwmf" class="btn btn-dc">DISCORD KATIL</a>
        </div>
    </div>

    <script>
        function copyIP() {
            navigator.clipboard.writeText("play.exonnetwork.com.tr");
            const msg = document.getElementById("msg");
            msg.innerText = "IP KOPYALANDI!";
            msg.style.color = "#ea580c";
            setTimeout(() => { msg.innerText = "Kopyalamak için tıkla"; msg.style.color = "#fff"; }, 2000);
        }
    </script>
</body>
</html>
