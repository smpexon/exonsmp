<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exon SMP | Hoşgeldin</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        body { 
            margin: 0; background: #121212; color: #fff; font-family: sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            animation: fadeIn 0.8s ease-out;
        }
        
        /* 2 Kat daha büyük grid yapısı */
        .grid-container { 
            display: grid; 
            grid-template-columns: 500px 900px; 
            gap: 40px; 
            max-width: 1500px; 
            width: 95%; 
        }
        
        .bottom-row { 
            grid-column: span 2; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 40px; 
        }

        /* Kart ve Logo Ayarları (Büyütüldü) */
        .card-logo { background: #1e1e1e; padding: 40px; border-radius: 30px; display: flex; justify-content: center; align-items: center; }
        .card-logo img { width: 100%; height: auto; }
        
        /* IP Kutusu (Büyütüldü) */
        .ip-box { 
            background: #1e1e1e; padding: 40px; border-radius: 30px; text-align: center; 
            display: flex; flex-direction: column; justify-content: center; cursor: pointer; transition: 0.3s;
        }
        .ip-box:hover { border: 2px solid #ea580c; }
        .ip-box img { width: 100%; max-width: 700px; margin: 0 auto; border-radius: 15px; }
        
        .ip-text-final { 
            margin-top: 25px; background: #ea580c; padding: 20px; border-radius: 15px; 
            font-weight: bold; font-size: 1.6rem; display: inline-block; width: fit-content; margin-left: auto; margin-right: auto;
        }
        
        /* Alt Kartlar (Büyütüldü) */
        .card { background: #1e1e1e; padding: 25px; border-radius: 30px; text-align: center; }
        .card img { width: 100%; height: 350px; object-fit: cover; border-radius: 20px; }
        
        .btn { display: block; background: #ea580c; color: white; padding: 20px; border-radius: 15px; text-decoration: none; font-weight: bold; margin-top: 25px; font-size: 1.4rem; }
        .btn-dc { background: #5865F2; }
        .btn-wp { background: #25D366; }
    </style>
</head>
<body>

    <div class="grid-container">
        <!-- Logo -->
        <div class="card-logo"><img src="logo.png" alt="Logo"></div>
        
        <!-- IP Kutusu -->
        <div class="ip-box" onclick="copyIP()">
            <img src="sunucuadres.png" alt="Server Address">
            <div class="ip-text-final" id="msg">play.exonnetwork.com.tr</div>
        </div>

        <!-- Alt Kartlar -->
        <div class="bottom-row">
            <div class="card">
                <img src="logo2.png">
                <a href="https://www.shopier.com/WienCraft" class="btn">MAĞAZA PANELİ</a>
            </div>
            <div class="card">
                <img src="logo3.png">
                <a href="https://wa.me/639552110999" class="btn btn-wp">WHATSAPP İLETİŞİM</a>
            </div>
            <div class="card">
                <img src="discordresmi.png">
                <a href="https://discord.gg/wRr95fuwmf" class="btn btn-dc">DISCORD KATIL</a>
            </div>
        </div>
    </div>

    <script>
        function copyIP() {
            navigator.clipboard.writeText("play.exonnetwork.com.tr");
            const msg = document.getElementById("msg");
            const originalText = msg.innerText;
            msg.innerText = "IP KOPYALANDI!";
            setTimeout(() => { msg.innerText = originalText; }, 2000);
        }
    </script>
</body>
</html>
