<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exon SMP | Premium</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        /* Animasyon Tanımı */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body { 
            margin: 0; 
            background: #1a1a1a; 
            color: #f0f0f0; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 60px;
            animation: fadeIn 1s ease-out; /* Sayfa açılış efekti */
        }
        
        .banner-top { 
            width: 100%; 
            height: 380px; 
            background: url('banner.png') center/cover; 
            border-bottom: 6px solid #ea580c; 
        }
        
        .content { 
            max-width: 1000px; /* Daha geniş alan */
            width: 90%; 
            padding: 50px 0; 
        }
        
        /* Premium IP Bölümü */
        .ip-card { 
            background: linear-gradient(145deg, #2a2a2a, #202020); 
            padding: 40px; 
            border-radius: 25px; 
            border: 1px solid #444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center; 
            margin-bottom: 50px; 
            cursor: pointer; 
            transition: 0.4s; 
        }
        .ip-card:hover { border-color: #ea580c; transform: scale(1.02); }
        .ip-text { 
            font-family: 'Courier New', monospace; 
            font-size: 2.5rem; 
            color: #fff; 
            font-weight: bold; 
            text-shadow: 0 0 15px #ea580c;
        }
        
        /* 3'lü Düzen */
        .grid-top { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 40px; }
        .grid-bottom { display: flex; justify-content: center; }
        
        .card { 
            padding: 30px; 
            border: 1px solid #333; 
            border-radius: 25px; 
            text-align: center; 
            background: #262626; 
            transition: 0.4s;
        }
        .card:hover { transform: translateY(-10px); border-color: #555; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; margin-bottom: 20px; }
        
        .btn { 
            display: block; 
            background: #ea580c; 
            color: white; 
            padding: 18px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .btn:hover { background: #d34e0a; transform: scale(1.05); }
        .btn-dc { background: #5865F2; }
        .btn-wp { background: #25D366; }
    </style>
</head>
<body>

    <div class="banner-top"></div>

    <div class="content">
        <div class="ip-card" onclick="copyIP()">
            <h3 style="color: #ea580c; margin-bottom: 10px;">SUNUCUYA BAĞLAN</h3>
            <div class="ip-text">play.exonnetwork.com.tr</div>
            <p id="msg" style="color: #888; margin-top: 15px;">Kopyalamak için tıkla</p>
        </div>

        <div class="grid-top">
            <div class="card">
                <img src="logo2.png">
                <a href="https://www.shopier.com/WienCraft" class="btn">MAĞAZA PANELİ</a>
            </div>
            <div class="card">
                <img src="logo3.png">
                <a href="https://wa.me/639552110999" class="btn btn-wp">WHATSAPP</a>
            </div>
        </div>

        <div class="grid-bottom">
            <div class="card" style="width: 100%; max-width: 480px;">
                <img src="discordresmi.png">
                <a href="https://discord.gg/wRr95fuwmf" class="btn btn-dc">DISCORD TOPLULUĞU</a>
            </div>
        </div>
    </div>

    <script>
        function copyIP() {
            navigator.clipboard.writeText("play.exonnetwork.com.tr");
            const msg = document.getElementById("msg");
            msg.innerText = "IP BAŞARIYLA KOPYALANDI!";
            msg.style.color = "#ea580c";
            setTimeout(() => { msg.innerText = "Kopyalamak için tıkla"; msg.style.color = "#888"; }, 2000);
        }
    </script>
</body>
</html>
