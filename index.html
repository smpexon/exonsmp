<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Exon SMP | Premium</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Logo Alanı */
        .header { text-align: center; margin-bottom: 30px; }
        .main-logo { width: 150px; height: 150px; border-radius: 20px; border: 2px solid #333; }
        
        /* Grid Yapısı */
        .grid-container { max-width: 900px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 20px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: #ea580c; }
        
        /* Resim Alanları */
        .card-img { width: 100%; height: 150px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }
        
        .btn { display: block; background: #ea580c; color: white; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 10px; }
        .btn-dc { background: #5865F2; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" class="main-logo">
        <h1 style="margin: 10px 0;">EXON SMP</h1>
    </div>

    <div class="grid-container">
        <div class="card">
            <h2>Sunucu IP</h2>
            <div style="background:#000; padding:15px; border-radius:10px; font-family:monospace; margin:10px 0; color:#ea580c; border:1px dashed #ea580c;">play.exonnetwork.com.tr</div>
            <p id="msg" style="font-size: 12px;">Kopyalamak için tıkla</p>
        </div>

        <div class="card">
            <img src="logo2.png" class="card-img">
            <a href="https://www.shopier.com/WienCraft" class="btn">Mağazaya Git</a>
        </div>

        <div class="card">
            <img src="logo3.png" class="card-img">
            <p>Sunucu İstatistikleri</p>
        </div>

        <div class="card">
            <img src="logo4.png" class="card-img">
            <a href="https://discord.gg/wRr95fuwmf" class="btn btn-dc">Discord'a Katıl</a>
        </div>
    </div>

    <script>
        function copyIP() {
            navigator.clipboard.writeText("play.exonnetwork.com.tr");
            document.getElementById("msg").innerText = "KOPYALANDI!";
            setTimeout(() => { document.getElementById("msg").innerText = "Kopyalamak için tıkla"; }, 2000);
        }
    </script>
</body>
</html>
