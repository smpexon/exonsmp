<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Exon SMP | Premium Survival</title>
    <style>
        body { margin: 0; padding: 0; background-color: #050505; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        .hero { width: 100%; padding: 60px 20px; text-align: center; border-bottom: 3px solid #ff4500; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://wallpaperaccess.com/full/2212456.jpg'); background-size: cover; background-position: center; }
        
        .main-container { max-width: 900px; width: 90%; margin-top: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .card { background: #111; border: 1px solid #333; padding: 25px; border-radius: 15px; }
        
        .ip-box { background: #000; padding: 15px; border: 1px solid #ff4500; border-radius: 8px; font-family: monospace; font-size: 18px; margin: 10px 0; cursor: pointer; color: #ff4500; }
        
        .btn { display: block; background: #ff4500; color: white; padding: 15px; text-align: center; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 15px; }
        
        h2 { color: #ff4500; margin-top: 0; }
    </style>
</head>
<body>

    <div class="hero">
        <h1 style="font-size: 3rem; margin: 0;">EXON SMP</h1>
        <p>2025'ten bu yana premium survival deneyimi.</p>
    </div>

    <div class="main-container">
        <div class="card">
            <h2>Sunucu Adresi</h2>
            <div class="ip-box" onclick="copyIP()">play.exonnetwork.com.tr</div>
            <p id="copy-msg" style="font-size: 12px;">Kopyalamak için üzerine tıkla!</p>
        </div>

        <div class="card">
            <h2>Mağaza</h2>
            <p>Premium üyelikler ve özel eşyalar.</p>
            <a href="https://www.shopier.com/WienCraft" class="btn">Mağazaya Git</a>
        </div>

        <div class="card" style="grid-column: span 2;">
            <h2>Discord</h2>
            <p>Topluluğumuza katıl ve güncellemelerden haberdar ol!</p>
            <a href="https://discord.gg/wRr95fuwmf" class="btn" style="background: #5865F2;">Discord'a Katıl</a>
        </div>
    </div>

    <script>
        function copyIP() {
            navigator.clipboard.writeText("play.exonnetwork.com.tr");
            const msg = document.getElementById("copy-msg");
            msg.innerText = "IP Kopyalandı!";
            setTimeout(() => { msg.innerText = "Kopyalamak için üzerine tıkla!"; }, 2000);
        }
    </script>
</body>
</html>
