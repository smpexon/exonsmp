<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exon SMP | Premium</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        body { 
            margin: 0; background: #121212; color: #fff; font-family: sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            animation: fadeIn 0.8s ease-out;
        }
        
        /* Büyük ve yayvan tasarım */
        .grid-container { 
            display: grid; 
            grid-template-columns: 350px 700px; 
            gap: 30px; 
            max-width: 1100px;
            width: 95%;
        }
        
        .bottom-row { 
            grid-column: span 2; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 30px; 
        }

        /* Kartlar (Daha büyük) */
        .card-logo { background: #1e1e1e; padding: 25px; border-radius: 20px; display: flex; justify-content: center; align-items: center; }
        .card-logo img { width: 100%; height: auto; }
        
        /* IP Kutusu (sunucuadres.png eklendi) */
        .ip-box { 
            background: #1e1e1e; padding: 25px; border-radius: 20px; text-align: center; 
            display: flex; flex-direction: column; justify-content: center; cursor: pointer; 
        }
        .ip-box img { width: 100%; max-width: 500px; margin: 0 auto; }
        
        .card { background: #1e1e1e; padding: 15px; border-radius: 20px; text-align: center; }
        .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; }
        
        .btn { display: block; background: #ea580c; color: white; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 15px; font-size: 1.1rem; }
        .btn-dc { background: #5865F2; }
        .btn-wp { background: #25D366; }
    </style>
</head>
<body>

    <div class="grid-container">
        <!-- Logo -->
        <div class="card-logo"><img src="logo.png" alt="Logo"></div>
        
        <!-- IP Kutusu (sunucuadres.png ile) -->
        <div class="ip-box" onclick="copyIP()">
            <img src="sunucuadres.png" alt="Sunucu Adresi">
            <p id="msg" style="margin-top: 15px; font-size: 0.9rem; opacity: 0.6;">Kopyalamak için tıkla</p>
        </div>

        <!-- Alt Kartlar -->
        <div class="bottom-row">
            <div class="card">
                <img src="logo2.png">
                <a href="https://www.shopier.com/WienCraft" class="btn">MAĞAZA PANELİ</a>
            </div>
            <div class="card">
                <img src="logo3.png">
                <a href="https://wa.me/639552110999" class="btn btn-wp">WHATSAPP İLETİŞİM</a>
            </div>
            <div class="card">
                <img src="discordresmi.png">
                <a href="https://discord.gg/wRr95fuwmf" class="btn btn-dc">DISCORD KATIL</a>
            </div>
        </div>
    </div>

    <script>
        function copyIP() {
            navigator.clipboard.writeText("play.exonnetwork.com.tr");
            const msg = document.getElementById("msg");
            msg.innerText = "IP BAŞARIYLA KOPYALANDI!";
            msg.style.color = "#ea580c";
            setTimeout(() => { msg.innerText = "Kopyalamak için tıkla"; msg.style.color = "#fff"; }, 2000);
        }
    </script>
</body>
</html>
