<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exon SMP | Premium</title>
    <style>
        body { 
            margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://wallpaperaccess.com/full/2212456.jpg'); 
            background-size: cover; 
            background-position: center;
            background-attachment: fixed;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; padding: 20px; 
            min-height: 100vh;
        }
        .header { text-align: center; margin-bottom: 40px; }
        .main-logo { width: 160px; height: 160px; border-radius: 20px; border: 3px solid #ea580c; box-shadow: 0 0 20px rgba(234, 88, 12, 0.5); }
        .grid-container { max-width: 900px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: rgba(17, 17, 17, 0.9); border: 1px solid #333; padding: 20px; border-radius: 20px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: #ea580c; transform: translateY(-5px); }
        .card-img { width: 100%; height: 160px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }
        .btn { display: block; background: #ea580c; color: white; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: #c2410c; }
        .btn-dc { background: #5865F2; }
        .btn-dc:hover { background: #4752c4; }
        h1 { font-size: 2.5rem; text-transform: uppercase; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" class="main-logo" alt="Exon Logo">
        <h1>EXON SMP</h1>
    </div>

    <div class="grid-container">
        <div class="card">
            <h2>Sunucu IP</h2>
            <div onclick="copyIP()" style="background:black; padding:20px; border-radius:10px; font-family:monospace; margin:15px 0; color:#ea580c; border:1px dashed #ea580c; font-size: 1.2rem; cursor: pointer;">play.exonnetwork.com.tr</div>
            <p id="msg" style="font-size: 12px; opacity: 0.7;">Kopyalamak için üzerine tıkla</p>
        </div>

        <div class="card">
            <img src="logo2.png" class="card-img" alt="Store">
            <a href="https://www.shopier.com/WienCraft" class="btn">MAĞAZAYA GİT</a>
        </div>

        <div class="card">
            <img src="logo3.png" class="card-img" alt="Stats">
            <p style="margin-top:10px; font-weight:bold;">SUNUCU İSTATİSTİKLERİ</p>
        </div>

        <div class="card">
            <img src="logo.png" class="card-img" alt="Discord">
            <a href="https://discord.gg/wRr95fuwmf" class="btn btn-dc">DISCORD'A KATIL</a>
        </div>
    </div>

    <script>
        function copyIP() {
            navigator.clipboard.writeText("play.exonnetwork.com.tr");
            document.getElementById("msg").innerText = "IP BAŞARIYLA KOPYALANDI!";
            setTimeout(() => { document.getElementById("msg").innerText = "Kopyalamak için üzerine tıkla"; }, 2000);
        }
    </script>
</body>
</html>
