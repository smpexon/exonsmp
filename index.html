<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Exon SMP | Premium</title>
    <style>
        body { margin: 0; background: #080808; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 900px; width: 100%; display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-top: 30px; }
        .card { background: #161616; border: 1px solid #333; border-radius: 15px; padding: 20px; }
        .full { grid-column: span 2; }
        h1 { font-size: 40px; margin-bottom: 20px; color: #ea580c; text-transform: uppercase; }
        .btn { background: #ea580c; color: white; padding: 15px; border-radius: 10px; text-decoration: none; display: block; text-align: center; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h1 style="margin-top:20px;">EXON SMP</h1>

    <div class="container">
        <!-- Sol Panel -->
        <div class="card" style="text-align:center;">
            <p>Sunucu Adresi</p>
            <div style="background:#000; padding:15px; border-radius:10px; margin:10px 0; font-family:monospace;">play.exonnetwork.com.tr</div>
            <button onclick="copyIP()" style="background:#222; color:#fff; border:none; padding:10px; width:100%; cursor:pointer;">Kopyala</button>
        </div>

        <!-- Sağ Panel -->
        <div class="card">
            <h3>MAĞAZA</h3>
            <a href="https://www.shopier.com/WienCraft" class="btn">Mağazaya Git</a>
        </div>

        <!-- Alt Panel -->
        <div class="card full">
            <h3>DISCORD</h3>
            <p>Topluluğumuza katılmak için tıkla!</p>
            <a href="https://discord.gg/wRr95fuwmf" class="btn" style="background:#5865F2;">Discord'a Katıl</a>
        </div>
    </div>

    <script>
        function copyIP() {
            navigator.clipboard.writeText("play.exonnetwork.com.tr");
            alert("IP kopyalandı!");
        }
    </script>
</body>
</html>
