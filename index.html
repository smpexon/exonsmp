<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Exon SMP | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            /* Buradaki linki kendi resminle değiştirebilirsin */
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://wallpaperaccess.com/full/2212456.jpg'); 
            background-size: cover; 
            background-position: center;
            background-attachment: fixed;
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; flex-direction: column; align-items: center; padding: 40px 20px; 
            min-height: 100vh;
        }
        .header { text-align: center; margin-bottom: 50px; }
        .main-logo { width: 180px; height: 180px; border-radius: 25px; border: 4px solid #ea580c; box-shadow: 0 0 30px rgba(234, 88, 12, 0.4); }
        .grid-container { max-width: 950px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .card { background: rgba(10, 10, 10, 0.85); border: 1px solid #333; padding: 25px; border-radius: 25px; text-align: center; transition: 0.4s; }
        .card:hover { border-color: #ea580c; transform: translateY(-8px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-img { width: 100%; height: 170px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; }
        .btn { display: block; background: #ea580c; color: white; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 14px; letter-spacing: 1px; transition: 0.3s; }
        .btn:hover { background: #c2410c; }
        .btn-dc { background: #5865F2; }
        .btn-wp { background: #25D366; }
        h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; margin: 20px 0 0 0; text-transform: uppercase; }
        h2 { font-size: 1.2rem; margin-top: 5px; color: #ea580c; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" class="main-logo" alt="Exon Logo">
        <h1>EXON SMP</h1>
        <h2 style="color:white; opacity:0.7;">PREMIUM SURVIVAL DENEYİMİ</h2>
    </div>

    <div class="grid-container">
        <div class="card">
            <h2 style="color:#ea580c;">SUNUCU IP</h2>
            <div onclick="copyIP()" style="background:#000; padding:25px; border-radius:12px; font-family:monospace; margin:20px 0; color:white; border:1px solid #ea580c; font-size: 1.4rem; cursor: pointer; letter-spacing: 2px;">play.exonnetwork.com.tr</div>
            <p id="msg" style="font-size: 13px; opacity: 0.6;">Kopyalamak için üzerine tıkla</p>
        </div>

        <div class="card">
            <img src="logo2.png" class="card-img" alt="Store">
            <a href="https://www.shopier.com/WienCraft" class="btn">MAĞAZA PANELİ</a>
        </div>

        <div class="card">
            <img src="logo3.png" class="card-img" alt="Contact">
            <a href="https://wa.me/639552110999" class="btn btn-wp">WHATSAPP İLETİŞİM</a>
        </div>

        <div class="card">
            <img src="logo.png" class="card-img" alt="Discord">
            <a href="https://discord.gg/wRr95fuwmf" class="btn btn-dc">DISCORD TOPLULUĞU</a>
        </div>
    </div>

    <script>
        function copyIP() {
            navigator.clipboard.writeText("play.exonnetwork.com.tr");
            document.getElementById("msg").innerText = "IP BAŞARIYLA KOPYALANDI!";
            setTimeout(() => { document.getElementById("msg").innerText = "Kopyalamak için üzerine tıkla"; }, 2000);
        }
    </script>
</body>
</html>
