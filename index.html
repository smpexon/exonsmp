<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Exon SMP | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .card { background: #111; border: 1px solid #222; border-radius: 20px; overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: #ea580c; }
    </style>
</head>
<body class="p-5 md:p-10">

    <!-- Header -->
    <div class="text-center mb-10">
        <img src="https://cdn.discordapp.com/attachments/1460981030663098523/1462777449162211434/1X1.png" class="w-32 mx-auto mb-4">
        <h1 class="text-4xl font-black italic">EXON SMP</h1>
    </div>

    <!-- Main Grid -->
    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- Sol Panel -->
        <div class="card p-6 flex flex-col items-center justify-center text-center">
            <img src="https://cdn.discordapp.com/attachments/1460981030663098523/1462777449162211434/1X1.png" class="w-40 mb-6">
            <button onclick="copyIP()" class="bg-gray-800 w-full py-3 rounded-xl font-bold hover:bg-orange-600">play.exonnetwork.com.tr</button>
        </div>

        <!-- Orta Panel (Görseller) -->
        <div class="md:col-span-2 grid grid-rows-2 gap-6">
            <div class="card h-48 bg-cover bg-center flex items-end p-4" style="background-image: url('https://wallpaperaccess.com/full/2212456.jpg');">
                <span class="bg-black/60 px-3 py-1 rounded-lg font-bold">MAĞAZA</span>
            </div>
            <div class="card h-48 bg-cover bg-center flex items-end p-4" style="background-image: url('https://images.alphacoders.com/955/955146.jpg');">
                <span class="bg-black/60 px-3 py-1 rounded-lg font-bold">İSTATİSTİKLER</span>
            </div>
        </div>

        <!-- Sağ Paneller -->
        <div class="card p-6 text-center">
            <h2 class="text-2xl font-bold mb-2">DISCORD</h2>
            <p class="text-gray-400">Topluluğumuza katıl!</p>
        </div>

        <div class="md:col-span-2 card p-6">
            <h2 class="font-bold mb-2">NASIL KATILIRIM?</h2>
            <div class="bg-black p-4 rounded-xl border border-gray-800 text-sm font-mono">
                IP: play.exonnetwork.com.tr
            </div>
        </div>
    </div>

    <script>
        function copyIP() {
            navigator.clipboard.writeText("play.exonnetwork.com.tr");
            alert("IP Kopyalandı!");
        }
    </script>
</body>
</html>
