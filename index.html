<!DOCTYPE html>
<html lang="tr">

        .btn { display: block; background: #ea580c; color: white; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 10px; }
        .btn-dc { background: #5865F2; }

</head>

    <div class="banner-top"></div>

    <div class="main-area">

            </div>

            </div>

</body>
</html>
